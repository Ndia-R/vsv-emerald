user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;

    keepalive_timeout  60;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_vary on;

    server_tokens off;

    # レート制限設定（DoS攻撃対策）
    # 認証APIエンドポイント: 1秒あたり10リクエスト（厳しい制限）
    limit_req_zone $binary_remote_addr zone=auth_api_limit:10m rate=10r/s;
    # 静的リソース: 1秒あたり100リクエスト（緩い制限）
    # Keycloak管理画面は多数のJSモジュールを動的に読み込むため、十分な余裕を持たせる
    limit_req_zone $binary_remote_addr zone=static_limit:10m rate=100r/s;
    # Registryエンドポイント: 1分あたり100リクエスト
    limit_req_zone $binary_remote_addr zone=registry_limit:10m rate=100r/m;

    # 許可するHTTPメソッド（TRACE等の危険なメソッドをブロック）
    map $request_method $invalid_method {
        default     1;
        GET         0;
        POST        0;
        PUT         0;
        DELETE      0;
        PATCH       0;
        HEAD        0;
        OPTIONS     0;
    }

    include /etc/nginx/conf.d/*.conf;
}

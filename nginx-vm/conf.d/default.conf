# ==============================================
# 本番環境用
# ==============================================

# HTTP → HTTPSリダイレクト
server {
    listen 80;
    server_name vsv-emerald.skygroup.local;

    # すべてのリクエストをHTTPSにリダイレクト
    return 301 https://$host$request_uri;
}

# HTTPSサーバー
server {
    listen 443 ssl;
    http2 on;
    server_name vsv-emerald.skygroup.local;

    # アクセスログとエラーログ
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ==============================================
    # SSL証明書設定
    # ==============================================
    ssl_certificate /etc/nginx/ssl/vsv-emerald.skygroup.local.pem;
    ssl_certificate_key /etc/nginx/ssl/vsv-emerald.skygroup.local-key.pem;

    # 最新のSSL設定（Mozilla Intermediate準拠）
    # TLSv1.2とTLSv1.3をサポート（互換性重視）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    # セッション設定
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # ==============================================
    # セキュリティヘッダー
    # ==============================================
    # HSTS（HTTP Strict Transport Security）- ブラウザにHTTPS強制
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # クリックジャッキング対策
    add_header X-Frame-Options "SAMEORIGIN" always;

    # MIMEタイプスニッフィング対策
    add_header X-Content-Type-Options "nosniff" always;

    # Content Security Policy (CSP)
    set $csp_default  "default-src 'self'";
    set $csp_script   "; script-src 'self'";
    set $csp_style    "; style-src 'self' 'unsafe-inline' https://vsv-crystal.skygroup.local";
    set $csp_font     "; font-src 'self' https://vsv-crystal.skygroup.local";
    set $csp_img      "; img-src 'self' https://vsv-crystal.skygroup.local data:";
    set $csp_connect  "; connect-src 'self'";
    set $csp_worker   "; worker-src 'self'";
    set $csp_frame    "; frame-ancestors 'self'";
    set $csp_base     "; base-uri 'self'";
    set $csp_form     "; form-action 'self'";
    set $csp_policy   "${csp_default}${csp_script}${csp_style}${csp_font}${csp_img}${csp_connect}${csp_worker}${csp_frame}${csp_base}${csp_form}";
    add_header Content-Security-Policy $csp_policy always;

    # Referrer-Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ブラウザ機能制限
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    # バックエンドのバージョン情報漏洩を防止
    proxy_hide_header Server;
    proxy_hide_header X-Powered-By;
    proxy_hide_header X-Application-Context;

    # 危険なHTTPメソッド（TRACE等）を拒否
    if ($request_method !~ ^(GET|POST|PUT|DELETE|PATCH|HEAD|OPTIONS)$) {
        return 405;
    }

    # ==============================================
    # エラーページ設定
    # ==============================================
    error_page 404 /404.html;
    location = /404.html {
        internal;
        default_type application/json;
        return 404 '{"error":"Not Found"}\n';
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
        default_type application/json;
        return 500 '{"error":"Internal Server Error"}\n';
    }

    # ==============================================
    # ヘルスチェック
    # ==============================================
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # ==============================================
    # BFF
    # ==============================================
    # BFF認証エンドポイント
    location /bff {
        limit_req zone=auth_api_limit burst=20 nodelay;

        proxy_pass http://api-gateway-bff:8080;

        # Cookie転送設定（BFFセッションCookie対応）
        proxy_cookie_path / /;
        # proxy_cookie_domainでドメイン指定を削除（ブラウザがCookieを受け入れるようにする）
        proxy_cookie_domain ~^(.*)$ "";

        # プロキシヘッダー
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # タイムアウト設定
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ==============================================
    # APIプロキシ（BFF経由でbackendのapiにアクセス）
    # ==============================================
    location /api {
        limit_req zone=auth_api_limit burst=50 nodelay;

        proxy_pass http://api-gateway-bff:8080;

        # Cookie転送設定（BFFセッションCookie + CSRFトークン対応）
        proxy_cookie_path / /;
        # proxy_cookie_domainでドメイン指定を削除（ブラウザがCookieを受け入れるようにする）
        proxy_cookie_domain ~^(.*)$ "";

        # プロキシヘッダー
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # タイムアウト設定
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ==============================================
    # OAuth2認証エンドポイント（Spring Security標準）
    # ==============================================
    location /oauth2 {
        limit_req zone=auth_api_limit burst=10 nodelay;

        proxy_pass http://api-gateway-bff:8080;

        # Cookie転送設定（OAuth2フロー用）
        proxy_cookie_path / /;
        # proxy_cookie_domainでドメイン指定を削除（ブラウザがCookieを受け入れるようにする）
        proxy_cookie_domain ~^(.*)$ "";

        # プロキシヘッダー
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # タイムアウト設定
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ==============================================
    # フロントエンド (SPA)
    # ==============================================
    # ルートアクセス（ウェルカムメッセージ）
    location = / {
        default_type text/html;
        return 200 '<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPS2 - Application Server</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        h1 { color: #333; }
        ul { list-style: none; padding: 0; }
        li { margin: 10px 0; }
        a { color: #0066cc; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>VPS2 - Web Application Server</h1>
    <p>Available applications:</p>
    <ul>
        <li><a href="/my-books">My Books Application</a></li>
        <li>---</li>
        <li><a href="/my-books-api-swagger/swagger-ui/index.html">Swagger UI - My Books API</a></li>
        <li><a href="/token-learn-swagger/swagger-ui/index.html">Swagger UI - Token API</a></li>
    </ul>
</body>
</html>';
    }

    # ==============================================
    # my-books アプリケーション
    # ==============================================
    location /my-books/ {
        proxy_pass http://my-books-frontend:80/;

        # プロキシヘッダー
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SPA履歴APIルーティング対応
        proxy_intercept_errors on;
        error_page 404 = @my_books_fallback;
    }

    # /my-books (末尾スラッシュなし) を /my-books/ にリダイレクト
    location = /my-books {
        return 301 /my-books/;
    }

    # フォールバック
    location @my_books_fallback {
        rewrite ^ /index.html break;
        proxy_pass http://my-books-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==============================================
    # my-books-api（Swagger UI）
    # ==============================================
    location /my-books-api-swagger/ {
        # Swagger UIはunsafe-inline/unsafe-evalが必要なため、ここでCSPを上書き
        # （nginxの仕様: locationブロックのadd_headerはサーバーレベルを置き換える）
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        set $csp_sw_default  "default-src 'self' https://*.skygroup.local";
        set $csp_sw_script   "; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:";
        set $csp_sw_style    "; style-src 'self' 'unsafe-inline' https://*.skygroup.local";
        set $csp_sw_font     "; font-src 'self' https://*.skygroup.local";
        set $csp_sw_img      "; img-src 'self' https://*.skygroup.local data:";
        set $csp_sw_connect  "; connect-src 'self' https://*.skygroup.local";
        set $csp_sw_worker   "; worker-src 'self' blob:";
        set $csp_sw_base     "; base-uri 'self'";
        set $csp_sw_form     "; form-action 'self'";
        set $csp_sw_policy   "${csp_sw_default}${csp_sw_script}${csp_sw_style}${csp_sw_font}${csp_sw_img}${csp_sw_connect}${csp_sw_worker}${csp_sw_base}${csp_sw_form}";
        add_header Content-Security-Policy $csp_sw_policy always;

        proxy_pass http://my-books-api:8080/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /my-books-api-swagger;
    }

    # /my-books-api（末尾スラッシュなし）→ Swagger UIへリダイレクト
    location = /my-books-api-swagger {
        return 301 /my-books-api-swagger/swagger-ui/index.html;
    }

    # ==============================================
    # token-learn（Swagger UI）
    # ==============================================
    location /token-learn-swagger/ {
        # Swagger UIはunsafe-inline/unsafe-evalが必要なため、ここでCSPを上書き
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        set $csp_sw_default  "default-src 'self' https://*.skygroup.local";
        set $csp_sw_script   "; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:";
        set $csp_sw_style    "; style-src 'self' 'unsafe-inline' https://*.skygroup.local";
        set $csp_sw_font     "; font-src 'self' https://*.skygroup.local";
        set $csp_sw_img      "; img-src 'self' https://*.skygroup.local data:";
        set $csp_sw_connect  "; connect-src 'self' https://*.skygroup.local";
        set $csp_sw_worker   "; worker-src 'self' blob:";
        set $csp_sw_base     "; base-uri 'self'";
        set $csp_sw_form     "; form-action 'self'";
        set $csp_sw_policy   "${csp_sw_default}${csp_sw_script}${csp_sw_style}${csp_sw_font}${csp_sw_img}${csp_sw_connect}${csp_sw_worker}${csp_sw_base}${csp_sw_form}";
        add_header Content-Security-Policy $csp_sw_policy always;

        proxy_pass http://token-learn:8080/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /token-learn-swagger;
    }

    # /token-learn（末尾スラッシュなし）→ Swagger UIへリダイレクト
    location = /token-learn-swagger {
        return 301 /token-learn-swagger/swagger-ui/index.html;
    }

    # /auth-callback → Swagger UIへリダイレクト（OAuth2認証後のコールバックURL）
    location = /auth-callback {
        return 301 /token-learn-swagger/swagger-ui/index.html;
    }
}

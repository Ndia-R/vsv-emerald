services:
  # DB
  my-books-db:
    image: mysql:8.0
    command: --secure-file-priv=/docker-entrypoint-initdb.d
    networks:
      - vsv-emerald-network
    environment:
      TZ: Asia/Tokyo
      MYSQL_DATABASE: ${MY_BOOKS_DB_NAME}
      MYSQL_USER: ${MY_BOOKS_DB_USER}
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/my_books_db_root_password
      MYSQL_PASSWORD_FILE: /run/secrets/my_books_db_password
    secrets:
      - my_books_db_root_password
      - my_books_db_password
    volumes:
      - ./db:/docker-entrypoint-initdb.d
      - ./db/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - my-books-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis
  redis:
    image: redis:8.2
    command: sh -c "redis-server --requirepass $$(cat /run/secrets/redis_password)"
    networks:
      - vsv-emerald-network
    secrets:
      - redis_password
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "redis-cli -a $$(cat /run/secrets/redis_password) ping",
        ]
      interval: 5s
      timeout: 3s
      retries: 3

  # API
  my-books-api:
    image: ${REGISTRY_HOSTNAME}/my-books-api:${MY_BOOKS_API_TAG}
    networks:
      - vsv-emerald-network
    environment:
      TZ: Asia/Tokyo
      # Database Configuration
      SPRING_DATASOURCE_URL: ${MY_BOOKS_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${MY_BOOKS_DB_USER}
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: ${SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT:-60000}
      # Identity Provider (IdP) Configuration
      IDP_ISSUER_URI: ${IDP_ISSUER_URI}
      # JPA Settings
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      SPRING_JPA_FORMAT_SQL: ${SPRING_JPA_FORMAT_SQL:-false}
      # DataSource Pool Settings
      DATASOURCE_POOL_MAX_SIZE: ${DATASOURCE_POOL_MAX_SIZE:-20}
      DATASOURCE_POOL_MIN_IDLE: ${DATASOURCE_POOL_MIN_IDLE:-10}
      DATASOURCE_CONNECTION_TIMEOUT: ${DATASOURCE_CONNECTION_TIMEOUT:-30000}
      # Error Response Settings
      SERVER_ERROR_INCLUDE_MESSAGE: ${SERVER_ERROR_INCLUDE_MESSAGE:-never}
      SERVER_ERROR_INCLUDE_STACKTRACE: ${SERVER_ERROR_INCLUDE_STACKTRACE:-never}
      # VPS HostName
      VPS_HOSTNAME: ${VPS_HOSTNAME}
      # Logging
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_LEVEL_SECURITY: ${LOG_LEVEL_SECURITY}
      # Forwarded Headers（nginx プレフィックス補正用）
      SERVER_FORWARD_HEADERS_STRATEGY: FRAMEWORK
    secrets:
      - my_books_db_password
    depends_on:
      my-books-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # BFF (Backend For Frontend)
  api-gateway-bff:
    image: ${REGISTRY_HOSTNAME}/api-gateway-bff:${API_GATEWAY_BFF_TAG}
    networks:
      - vsv-emerald-network
    environment:
      TZ: Asia/Tokyo
      # Identity Provider (IdP) Configuration
      IDP_CLIENT_ID: ${IDP_CLIENT_ID}
      IDP_ISSUER_URI: ${IDP_ISSUER_URI}
      IDP_REGISTRATION_PATH: ${IDP_REGISTRATION_PATH}
      # BFF関連のURL（VPS_HOSTNAMEから組み立てる）
      IDP_REDIRECT_URI: https://${VPS_HOSTNAME}/bff/login/oauth2/code/idp
      IDP_POST_LOGOUT_REDIRECT_URI: https://${VPS_HOSTNAME}/logout-complete
      DEFAULT_FRONTEND_URL: https://${VPS_HOSTNAME}
      # CORS設定（マルチアプリケーション対応）
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://${VPS_HOSTNAME}}
      # Resource Servers Configuration (動的読み込み対応)
      RESOURCE_SERVERS: ${RESOURCE_SERVERS}
      SERVICE_01_URL: ${SERVICE_01_URL}
      SERVICE_01_PATH_PREFIX: ${SERVICE_01_PATH_PREFIX}
      # Session Configuration
      SESSION_TIMEOUT: ${SESSION_TIMEOUT}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE}
      # Logging Settings
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_LEVEL_SECURITY: ${LOG_LEVEL_SECURITY}
    secrets:
      - redis_password
      - idp_client_secret
    depends_on:
      redis:
        condition: service_healthy
      my-books-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # Token Learn
  token-learn:
    image: ${REGISTRY_HOSTNAME}/token-learn:1.0.0
    networks:
      - vsv-emerald-network
    environment:
      TZ: Asia/Tokyo
      # Identity Provider (IdP) Configuration
      IDP_CLIENT_ID: ${IDP_CLIENT_ID}
      IDP_ISSUER_URI: ${IDP_ISSUER_URI}
      # VPS HostName
      VPS_HOSTNAME: ${VPS_HOSTNAME}
      # Logging Settings
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_LEVEL_SECURITY: ${LOG_LEVEL_SECURITY:-INFO}
      # Forwarded Headers（nginx プレフィックス補正用）
      SERVER_FORWARD_HEADERS_STRATEGY: FRAMEWORK
    secrets:
      - idp_client_secret
    depends_on:
      api-gateway-bff:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # # APP
  # my-books-frontend:
  #   image: ${REGISTRY_HOSTNAME}/my-books-frontend:${MY_BOOKS_FRONTEND_TAG}
  #   networks:
  #     - vsv-emerald-network
  #   environment:
  #     TZ: Asia/Tokyo
  #   depends_on:
  #     token-learn:
  #       condition: service_healthy
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:80/"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3
  #     start_period: 10s

  # Nginx (通信窓口 / リバースプロキシ)
  nginx-edge:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    networks:
      - vsv-emerald-network
    volumes:
      - ./nginx-dev/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-dev/conf.d:/etc/nginx/conf.d:ro
      - ./nginx-dev/ssl:/etc/nginx/ssl:ro
    depends_on:
      token-learn:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  vsv-emerald-network:
    external: true

secrets:
  redis_password:
    file: ./secrets/redis_password
  idp_client_secret:
    file: ./secrets/idp_client_secret
  my_books_db_root_password:
    file: ./secrets/my_books_db_root_password
  my_books_db_password:
    file: ./secrets/my_books_db_password

volumes:
  my-books-db-data:

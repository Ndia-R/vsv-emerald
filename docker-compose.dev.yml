services:
  nginx-edge:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-dev/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-dev/conf.d:/etc/nginx/conf.d:ro
      - ./nginx-dev/ssl:/etc/nginx/ssl:ro
    networks:
      - vsv-emerald-network

networks:
  vsv-emerald-network:
    external: true

# ==============================================
# 開発環境用
# ==============================================

# HTTP → HTTPSリダイレクト
server {
    listen 80;
    server_name localhost;

    # すべてのリクエストをHTTPSにリダイレクト
    return 301 https://$host$request_uri;
}

# HTTPSサーバー
server {
    listen 443 ssl;
    http2 on;
    server_name localhost;

    # アクセスログとエラーログ
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ==============================================
    # SSL証明書設定
    # ==============================================
    ssl_certificate /etc/nginx/ssl/localhost.pem;
    ssl_certificate_key /etc/nginx/ssl/localhost-key.pem;

    # 最新のSSL設定（Mozilla Intermediate準拠）
    # TLSv1.2とTLSv1.3をサポート（互換性重視）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    # セッション設定
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # ==============================================
    # セキュリティヘッダー
    # ==============================================
    # HSTS（HTTP Strict Transport Security）- ブラウザにHTTPS強制
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # クリックジャッキング対策
    add_header X-Frame-Options "SAMEORIGIN" always;

    # MIMEタイプスニッフィング対策
    add_header X-Content-Type-Options "nosniff" always;

    # XSS対策（古いブラウザ向け）
    add_header X-XSS-Protection "1; mode=block" always;

    # Content Security Policy (CSP)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://vsv-crystal.skygroup.local; font-src 'self' https://vsv-crystal.skygroup.local; img-src 'self' https://vsv-crystal.skygroup.local data:;" always;

    # Referrer-Policy
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ==============================================
    # エラーページ設定
    # ==============================================
    error_page 404 /404.html;
    location = /404.html {
        internal;
        default_type application/json;
        return 404 '{"error":"Not Found"}\n';
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
        default_type application/json;
        return 500 '{"error":"Internal Server Error"}\n';
    }

    # ==============================================
    # ヘルスチェック
    # ==============================================
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # ==============================================
    # BFF
    # ==============================================
    # BFF認証エンドポイント
    location /bff {
        proxy_pass http://api-gateway-bff:8080;

        # Cookie転送設定（BFFセッションCookie対応）
        proxy_cookie_path / /;
        # proxy_cookie_domainでドメイン指定を削除（ブラウザがCookieを受け入れるようにする）
        proxy_cookie_domain ~^(.*)$ "";

        # プロキシヘッダー
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # タイムアウト設定
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ==============================================
    # APIプロキシ（BFF経由でbackendのapiにアクセス）
    # ==============================================
    location /api {
        proxy_pass http://api-gateway-bff:8080;

        # Cookie転送設定（BFFセッションCookie + CSRFトークン対応）
        proxy_cookie_path / /;
        # proxy_cookie_domainでドメイン指定を削除（ブラウザがCookieを受け入れるようにする）
        proxy_cookie_domain ~^(.*)$ "";

        # プロキシヘッダー
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # タイムアウト設定
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ==============================================
    # OAuth2認証エンドポイント（Spring Security標準）
    # ==============================================
    location /oauth2 {
        proxy_pass http://api-gateway-bff:8080;

        # Cookie転送設定（OAuth2フロー用）
        proxy_cookie_path / /;
        # proxy_cookie_domainでドメイン指定を削除（ブラウザがCookieを受け入れるようにする）
        proxy_cookie_domain ~^(.*)$ "";

        # プロキシヘッダー
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # タイムアウト設定
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ==============================================
    # フロントエンド (SPA)
    # ==============================================
    # ルートアクセス（ウェルカムメッセージ）
    location = / {
        default_type text/html;
        return 200 '<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPS2 - Application Server</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        h1 { color: #333; }
        ul { list-style: none; padding: 0; }
        li { margin: 10px 0; }
        a { color: #0066cc; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>VPS2 - Web Application Server</h1>
    <p>Available applications:</p>
    <ul>
        <li><a href="/my-books">My Books Application</a></li>
    </ul>
</body>
</html>';
    }

    # my-books アプリケーション
    location /my-books/ {
        # rewriteを削除！そのままプロキシ
        proxy_pass http://my-books-frontend:80/;

        # WebSocket/HMR対応（開発環境用）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SPA履歴APIルーティング対応
        proxy_intercept_errors on;
        error_page 404 = @my_books_fallback;
    }

    # /my-books (末尾スラッシュなし) を /my-books/ にリダイレクト
    location = /my-books {
        return 301 /my-books/;
    }

    # フォールバック
    location @my_books_fallback {
        rewrite ^ /index.html break;
        proxy_pass http://my-books-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
